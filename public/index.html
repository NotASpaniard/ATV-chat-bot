<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVT Chat Bot</title>
  <!-- áp theme trước khi vẽ để tránh nháy màu -->
  <script>
    (function () { var t = localStorage.getItem('avt-theme'); if (['light','dark','coffee'].indexOf(t) < 0) t = 'light'; document.documentElement.setAttribute('data-theme', t); })();
  </script>
  <link rel="stylesheet" href="/style.css" />
  <!-- PWA: cài được như app trên máy -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#6a83ef" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</head>
<body>
  <div id="shell">
    <aside id="sidebar">
      <div class="side-brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.6L18.5 9l-4.6 1.9L12 15l-1.9-4.1L5.5 9l4.6-1.4z"/><path d="M18 15l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></svg>
        </span>
        <strong>AVT Chat Bot</strong>
        <span class="side-spacer"></span>
        <button id="theme-btn" class="icon-btn" type="button" title="Đổi giao diện"></button>
        <button id="mem-btn" class="icon-btn" type="button" title="Ghi nhớ giữa các cuộc hội thoại"></button>
      </div>

      <button id="clear-btn" class="side-new" type="button" title="Cuộc trò chuyện mới">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Cuộc trò chuyện mới</span>
      </button>

      <div class="side-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="convo-search" type="text" placeholder="Tìm trong lịch sử & tài liệu…" />
      </div>
      <div class="convo-head">Cuộc trò chuyện</div>
      <div id="convo-list" class="convo-list"></div>

      <a class="side-link side-admin" href="/admin.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h10M4 12h16M4 18h7"/><circle cx="17" cy="6" r="2"/><circle cx="14" cy="18" r="2"/></svg>
        <span>Quản trị dữ liệu</span>
      </a>

      <div class="side-foot">
        <span class="status-dot" title="Đang hoạt động"></span>
        <button id="model-tag" class="model-tag" type="button" title="Cài đặt model — chọn / tải / xóa">…</button>
      </div>
    </aside>

    <main id="main">
      <div id="res-warning" class="res-warning hidden"></div>
      <div id="messages" aria-live="polite">
        <div class="welcome">
          <div class="w-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.6L18.5 9l-4.6 1.9L12 15l-1.9-4.1L5.5 9l4.6-1.4z"/><path d="M18 15l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></svg>
          </div>
          <h1>Xin chào</h1>
          <p>Trợ lý AI nội bộ, chạy hoàn toàn trên máy chủ của doanh nghiệp. Hãy đặt câu hỏi bên dưới.</p>
        </div>
      </div>

      <footer id="composer">
        <form id="chat-form">
          <textarea id="input" rows="1" placeholder="Nhập câu hỏi… (Enter để gửi, Shift+Enter xuống dòng)" autofocus></textarea>
          <div class="composer-row">
            <div class="composer-left">
              <button id="tpl-btn" class="tool-btn" type="button" title="Chèn mẫu câu lệnh">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v4H4z"/><path d="M4 12h10M4 17h10"/></svg>
                <span>Mẫu</span>
              </button>
              <button id="advise-toggle" class="tool-btn" type="button" title="Nhập yêu cầu + số lượng, bot tự chọn phương án tối ưu từ bảng giá">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></svg>
                <span>Tư vấn tối ưu</span>
              </button>
            </div>
            <button id="send-btn" type="submit" title="Gửi">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
            </button>
          </div>
        </form>
        <div class="hint">Nội dung do AI tạo có thể chưa chính xác — vui lòng kiểm tra trước khi sử dụng chính thức.</div>
      </footer>
    </main>
  </div>

  <script src="/theme.js"></script>
  <script src="/app.js"></script>
</body>
</html>
